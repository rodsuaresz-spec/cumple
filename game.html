<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raspa y Gana para Diana</title>
    <link rel="stylesheet" href="game.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="back-link">
        <a href="index.html">&larr; Volver</a>
    </div>

    <header>
        <h1>¡Raspa y Gana con Amor!</h1>
        <p>Amor, raspa cada tarjeta para descubrir nuestras fotos y un mensaje especial para ti.</p>
    </header>

    <div class="game-container">
        <div class="scratch-card" data-message="¡Te amo con todo mi corazón!">
            <img src="images/1.jpeg" alt="Foto 1">
            <canvas class="scratch-canvas"></canvas>
            <div class="love-message"></div>
        </div>
        <div class="scratch-card" data-message="Eres la mujer más hermosa del mundo.">
            <img src="images/2.jpeg" alt="Foto 2">
            <canvas class="scratch-canvas"></canvas>
            <div class="love-message"></div>
        </div>
        <div class="scratch-card" data-message="Mi lugar favorito es a tu lado.">
            <img src="images/3.jpeg" alt="Foto 3">
            <canvas class="scratch-canvas"></canvas>
            <div class="love-message"></div>
        </div>
        <div class="scratch-card" data-message="Gracias por hacerme tan feliz.">
            <img src="images/4.jpeg" alt="Foto 4">
            <canvas class="scratch-canvas"></canvas>
            <div class="love-message"></div>
        </div>
        <div class="scratch-card" data-message="Eres mi sueño hecho realidad.">
            <img src="images/5.jpeg" alt="Foto 5">
            <canvas class="scratch-canvas"></canvas>
            <div class="love-message"></div>
        </div>
        <div class="scratch-card" data-message="Siempre estaré para ti, mi amor.">
            <img src="images/6.jpeg" alt="Foto 6">
            <canvas class="scratch-canvas"></canvas>
            <div class="love-message"></div>
        </div>
        <div class="scratch-card" data-message="¡Feliz Cumpleaños, mi vida!">
            <img src="images/7.jpeg" alt="Foto 7">
            <canvas class="scratch-canvas"></canvas>
            <div class="love-message"></div>
        </div>
    </div>

    <footer>
        <p>Con amor, solo para ti &hearts;</p>
    </footer>

    <script src="game.js"></script>
</body>
</html>
